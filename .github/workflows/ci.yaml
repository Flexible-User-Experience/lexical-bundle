name: CI

on:
  push:
    branches: [main, devel]
  pull_request: ~

jobs:
  tests:
    name: "PHP ${{ matrix.php }} · Symfony ${{ matrix.symfony }} ${{ matrix.composer-flags }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.2', symfony: '7.4.*', composer-flags: '--prefer-lowest' }
          - { php: '8.3', symfony: '7.*' }
          - { php: '8.4', symfony: '8.*' }

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '${{ matrix.php }}'
          coverage: none
          tools: composer:v2

      - name: Install Symfony Flex
        run: |
          composer global config --no-plugins allow-plugins.symfony/flex true
          composer global require --no-progress --no-scripts --no-plugins symfony/flex

      - name: Pin the Symfony version
        run: composer config extra.symfony.require "${{ matrix.symfony }}"

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress ${{ matrix.composer-flags }}

      - name: Run tests
        run: vendor/bin/phpunit
